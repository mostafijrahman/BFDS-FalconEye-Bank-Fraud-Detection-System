<!DOCTYPE html>

<head>

<title>BFDS – Entity Relationship Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    color: #e2e8f0;

    padding: 24px;

  <rect width="1320" height="920" fill="#0f172a" rx="12"/>

  <!-- ====================================================
       ENTITY: users  (center-left)
  ==================================================== -->

  <text x="500" y="146" fill="#94a3b8" font-size="10">last_name  (NVARCHAR 100)</text>

  <text x="500" y="174" fill="#94a3b8" font-size="10">phone      (NVARCHAR 20)</text>
  <text x="500" y="188" fill="#94a3b8" font-size="10">account_created_at (DATETIME2)</text>

  <text x="500" y="244" fill="#94a3b8" font-size="10">registration_ip_address (NVARCHAR 45)</text>

       ENTITY: cards
  ==================================================== -->

  <text x="130" y="294" fill="#e2e8f0" font-size="10">card_id (INT, IDENTITY)</text>

  <text x="110" y="414" fill="#94a3b8" font-size="10">reported_lost_at (DATETIME2)</text>
  <text x="110" y="428" fill="#94a3b8" font-size="10">daily_limit / monthly_limit (DEC)</text>
  <text x="110" y="455" fill="#64748b" font-size="9" font-style="italic">CASCADE DELETE from users</text>

       ENTITY: merchants
  ==================================================== -->

  <text x="880" y="396" fill="#94a3b8" font-size="10">fraud_report_count (INT)</text>
  <text x="880" y="410" fill="#94a3b8" font-size="10">created_at (DATETIME2)</text>

       ENTITY: transactions  (CENTER)
  ==================================================== -->
  <g filter="url(#shadow)">

    <rect x="440" y="396" width="280" height="8"   fill="#0e2d3f"/>
  </g>

  <text x="452" y="420" fill="#fbbf24" font-size="10" font-weight="600">PK</text>
  <text x="472" y="420" fill="#e2e8f0" font-size="10">transaction_id (BIGINT, IDENTITY)</text>
  <line x1="452" y1="424" x2="708" y2="424" stroke="#0e2d3f" stroke-width="1"/>
  <text x="452" y="438" fill="#fb923c" font-size="10" font-weight="600">FK</text>
  <text x="472" y="438" fill="#e2e8f0" font-size="10">card_id → cards.card_id</text>
  <text x="452" y="452" fill="#fb923c" font-size="10" font-weight="600">FK</text>

  <text x="452" y="466" fill="#fb923c" font-size="10" font-weight="600">FK</text>
  <text x="472" y="466" fill="#e2e8f0" font-size="10">user_id → users.user_id</text>
  <line x1="452" y1="470" x2="708" y2="470" stroke="#0e2d3f" stroke-width="1"/>
  <text x="452" y="484" fill="#94a3b8" font-size="10">transaction_amount (DECIMAL 15,2)</text>
  <text x="452" y="498" fill="#94a3b8" font-size="10">currency_code (NVARCHAR 3)</text>
  <text x="452" y="512" fill="#94a3b8" font-size="10">transaction_timestamp (DATETIME2)</text>
  <text x="452" y="526" fill="#94a3b8" font-size="10">merchant_country / customer_country</text>
  <text x="452" y="540" fill="#94a3b8" font-size="10">merchant_mcc (NVARCHAR 10)</text>

  <text x="452" y="568" fill="#94a3b8" font-size="10">is_online (BIT)</text>
  <text x="452" y="582" fill="#94a3b8" font-size="10">device_id (NVARCHAR 255)</text>
  <text x="452" y="596" fill="#94a3b8" font-size="10">ip_address (NVARCHAR 45)</text>
  <text x="452" y="610" fill="#34d399" font-size="10">latitude / longitude (DECIMAL)</text>

       ENTITY: alerts
  ==================================================== -->
  <g filter="url(#shadow)">
    <rect x="870" y="530" width="220" height="270" fill="#0c2340" rx="8" stroke="#f59e0b" stroke-width="2"/>

  </g>

  <text x="900" y="582" fill="#e2e8f0" font-size="10">alert_id (BIGINT, IDENTITY)</text>

  <text x="880" y="600" fill="#fb923c" font-size="10" font-weight="600">FK</text>
  <text x="900" y="600" fill="#e2e8f0" font-size="10">transaction_id → transactions</text>
  <text x="880" y="614" fill="#fb923c" font-size="10" font-weight="600">FK</text>

  <text x="880" y="628" fill="#fb923c" font-size="10" font-weight="600">FK</text>

  <text x="880" y="702" fill="#94a3b8" font-size="10">investigation_notes (NVARCHAR MAX)</text>
  <text x="880" y="716" fill="#94a3b8" font-size="10">created_at / resolved_at (DATETIME2)</text>

  ==================================================== -->

    <rect x="100" y="560" width="230" height="200" fill="#1a1a2e" rx="8" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="100" y="560" width="230" height="34"  fill="#2d1b4e" rx="8"/>
    <rect x="100" y="586" width="230" height="8"   fill="#2d1b4e"/>

  <line x1="110" y1="616" x2="320" y2="616" stroke="#2d1b4e" stroke-width="1"/>
  <text x="110" y="630" fill="#fb923c" font-size="10" font-weight="600">FK</text>
  <text x="130" y="630" fill="#e2e8f0" font-size="10">transaction_id → transactions</text>
  <line x1="110" y1="634" x2="320" y2="634" stroke="#2d1b4e" stroke-width="1"/>

  <!-- ====================================================
       ENTITY: user_known_locations
  ==================================================== -->
  <g filter="url(#shadow)">
    <rect x="100" y="60" width="230" height="180" fill="#0d2214" rx="8" stroke="#34d399" stroke-width="2"/>

  <text x="130" y="110" fill="#e2e8f0" font-size="10">location_id (INT, IDENTITY)</text>
  <line x1="110" y1="114" x2="320" y2="114" stroke="#1a3a2a" stroke-width="1"/>
  <text x="110" y="128" fill="#fb923c" font-size="10" font-weight="600">FK</text>
  <text x="130" y="128" fill="#e2e8f0" font-size="10">user_id → users.user_id</text>
  <text x="110" y="142" fill="#94a3b8" font-size="10">UNIQUE(user_id, city, country_iso_code)</text>
  <line x1="110" y1="146" x2="320" y2="146" stroke="#1a3a2a" stroke-width="1"/>
  <text x="110" y="160" fill="#94a3b8" font-size="10">city (NVARCHAR 100)</text>
  <text x="110" y="174" fill="#94a3b8" font-size="10">country_iso_code (NVARCHAR 2)</text>
  <text x="110" y="188" fill="#34d399" font-size="10">latitude / longitude (DECIMAL)</text>
  <text x="110" y="202" fill="#94a3b8" font-size="10">last_transaction_at / frequency_count</text>
  <text x="110" y="222" fill="#64748b" font-size="9" font-style="italic">CASCADE DELETE from users</text>

  <!-- ====================================================
       ENTITY: user_devices
  ==================================================== -->
  <g filter="url(#shadow)">
    <rect x="870" y="60" width="220" height="180" fill="#0d2214" rx="8" stroke="#34d399" stroke-width="2"/>

  <text x="900" y="128" fill="#e2e8f0" font-size="10">user_id → users.user_id</text>
  <line x1="880" y1="132" x2="1080" y2="132" stroke="#1a3a2a" stroke-width="1"/>

  <text x="880" y="208" fill="#64748b" font-size="9" font-style="italic">CASCADE DELETE from users</text>

  <!-- ====================================================
       ENTITY: authentication (NEW)
  ==================================================== -->
  <g filter="url(#shadow)">
    <rect x="490" y="760" width="280" height="120" fill="#1a0a0a" rx="8" stroke="#ef4444" stroke-width="2"/>
    <rect x="490" y="760" width="280" height="34"  fill="#3a1a1a" rx="8"/>

  <text x="502" y="852" fill="#94a3b8" font-size="10">password_hash | is_active | failed_attempts | locked_until</text>

  <line x1="310" y1="380" x2="440" y2="460" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="870" y1="380" x2="720" y2="460" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="630" y1="760" x2="620" y2="320" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="6,4" marker-end="url(#arrow-red)"/>
